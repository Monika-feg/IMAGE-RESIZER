<!DOCTYPE html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-policy" content="script-src 'self'">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&family=Nunito:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/renderer.js" defer></script>
    <title>Rosa Bildförminskare</title>
  </head>
  <body>
    <main class="app-shell">
      <section class="hero-card">
        <div class="hero-copy">
          <p class="eyebrow">Söt liten app</p>
          <h1>Rosa Bildförminskare</h1>
          <p class="intro">
            Välj en bild, se originalmåtten direkt och spara en mindre version med
            ett klick.
          </p>
        </div>

        <div class="upload-card">
          <label class="upload-dropzone" for="img">
            <span class="bubble bubble-one"></span>
            <span class="bubble bubble-two"></span>
            <img class="upload-logo" src="./images/logo.svg" alt="App-logga" />
            <span class="upload-title">Välj en bild</span>
            <span class="upload-subtitle">PNG, JPG or GIF</span>
          </label>
          <input id="img" type="file" class="sr-only" />
        </div>

        <form id="img-form" class="hidden kawaii-form">
          <div class="field-grid">
            <label class="field-card" for="width">
              <span class="field-label">Bredd</span>
              <input type="number" name="width" id="width" placeholder="Bredd" />
            </label>

            <label class="field-card" for="height">
              <span class="field-label">Höjd</span>
              <input type="number" name="height" id="height" placeholder="Höjd" />
            </label>
          </div>

          <button type="submit" class="resize-button">Förminska bild</button>
        </form>

        <section class="info-panel" aria-label="Vald bildinformation">
          <div class="info-pill">
            <span class="info-label">Fil</span>
            <span id="filename" class="info-value">Ingen bild vald ännu</span>
          </div>

          <div class="info-pill">
            <span class="info-label">Sparas i</span>
            <span id="output-path" class="info-value">Väntar på vald bild...</span>
          </div>
        </section>
      </section>
    </main>
  </body>
</html>
